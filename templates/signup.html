<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - TourZen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>

<body>

    <div class="auth-wrapper py-5 px-3">
        <div class="auth-card" style="max-width: 500px;">
            <div class="text-center mb-4">
                <svg xmlns="http://www.w3.org/-2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width: 48px; color: var(--primary-green);">
                    <path fill-rule="evenodd" d="M11.54 22.351l.07.04.028.016a.76.76 0 00.723 0l.028-.015.071-.041a16.975 16.975 0 001.144-.742 19.58 19.58 0 002.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 00-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 002.682 2.282 16.975 16.975 0 001.145.742zM12 13.5a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
                </svg>
                <h2 class="mt-2 mb-1">Create Account</h2>
                <p class="text-muted small">Join TourZen and experience Sri Lanka today.</p>
            </div>

            <form action="{{ url_for('auth_bp.signup') }}" method="POST">
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-semibold text-muted small">Username</label>
                        <input type="text" name="username" value="{{ username or '' }}" class="form-control bg-light border-0 py-2" required>
                    </div>

                    <div class="col-6 mb-3">
                        <label class="form-label fw-semibold text-muted small">Email Address</label>
                        <input type="email" name="email" value="{{ email or '' }}" class="form-control bg-light border-0 py-2" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-semibold text-muted small">Password</label>
                        <input type="password" name="password" class="form-control bg-light border-0 py-2" required>
                    </div>

                    <div class="col-6 mb-4">
                        <label class="form-label fw-semibold text-muted small">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control bg-light border-0 py-2" required>
                    </div>
                </div>

                {% if error %}
                    <div class="alert alert-danger py-2 border-0" style="border-radius:10px;">{{ error }}</div>
                {% endif %}

                <button type="submit" class="btn btn-primary-brand w-100 py-3 mt-1">Sign Up</button>
            </form>

            <p class="text-center mt-4 pt-3 border-top mb-0 text-muted">Already have an account?
                <a href="{{ url_for('auth_bp.login') }}" style="color:var(--primary-green); font-weight:600; text-decoration:none;">Login here</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
